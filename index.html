<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتب المحامي عبد المحسن الحارثي - عقود الأتعاب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial,sans-serif;direction:rtl;background:#f1f5f9;color:#1e293b;font-size:14px;min-height:100vh}
input,select,textarea,button{font-family:'Tajawal',Arial,sans-serif;font-size:14px}

/* Header */
.header{background:#1e293b;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.header-brand{display:flex;align-items:center;gap:10px}
.header-brand h1{font-size:15px;font-weight:700}
.header-brand p{font-size:11px;opacity:.6;margin-top:1px}
.header-scale{font-size:24px}
.header-actions{display:flex;gap:8px;align-items:center}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#1e293b;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:#f8fafc;border-color:#94a3b8}
.btn-primary{background:#1e293b;color:#fff;border-color:#1e293b}
.btn-primary:hover{background:#334155}
.btn-success{background:#15803d;color:#fff;border-color:#15803d}
.btn-success:hover{background:#166534}
.btn-danger{background:#dc2626;color:#fff;border-color:#dc2626}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.6;cursor:not-allowed}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:20px;max-width:1000px;margin:0 auto}
.stat{border-radius:12px;padding:16px;text-align:center;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.stat .num{font-size:28px;font-weight:700}
.stat .lbl{font-size:11px;opacity:.85;margin-top:4px}

/* Tabs */
.tabs-wrap{max-width:1000px;margin:0 auto;padding:0 20px}
.tabs{display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:0}
.tab{padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;border:none;border-bottom:3px solid transparent;color:#64748b;background:none;margin-bottom:-2px;transition:all .15s}
.tab.active{border-bottom-color:#1e293b;color:#1e293b}

/* Content */
.content-wrap{max-width:1000px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}

/* Form */
.form-label{display:block;font-size:12px;color:#64748b;margin-bottom:4px;margin-top:12px;font-weight:500}
.form-input{width:100%;padding:9px 13px;border-radius:8px;border:1px solid #cbd5e1;background:#fff;color:#1e293b;font-size:13px;transition:border .15s}
.form-input:focus{outline:none;border-color:#1e293b;box-shadow:0 0 0 3px rgba(30,41,59,.08)}
textarea.form-input{resize:vertical;min-height:100px}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-nav{display:flex;justify-content:space-between;margin-top:24px;padding-top:16px;border-top:1px solid #f1f5f9}

/* Steps */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.step-col{display:flex;flex-direction:column;align-items:center}
.step-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;transition:all .2s}
.step-done{background:#16a34a;color:#fff}
.step-active{background:#1e293b;color:#fff}
.step-pending{background:#fff;border:2px solid #cbd5e1;color:#94a3b8}
.step-label{font-size:10px;text-align:center;margin-top:4px;width:56px;color:#64748b;font-weight:500}
.step-line{width:32px;height:2px;flex-shrink:0;transition:background .2s}
.step-line-done{background:#16a34a}
.step-line-pending{background:#e2e8f0}

/* Cases list */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{padding-right:38px}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:16px;pointer-events:none}
.case-row{display:flex;align-items:center;justify-content:space-between;padding:14px;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:8px;background:#fff;transition:border-color .15s}
.case-row:hover{border-color:#94a3b8}
.case-name{font-weight:600;font-size:14px;color:#1e293b}
.case-num{font-size:11px;background:#f1f5f9;color:#64748b;padding:1px 7px;border-radius:4px;font-weight:400;margin-right:6px}
.case-meta{font-size:12px;color:#64748b;margin-top:3px}
.case-actions{display:flex;align-items:center;gap:6px;margin-right:12px}
.ibtn{width:32px;height:32px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#64748b;transition:all .15s;font-size:15px}
.ibtn:hover{background:#f1f5f9}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-yellow{background:#fef9c3;color:#92400e}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#b91c1c}

/* Contract */
.contract-preview{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:24px;font-size:12px;line-height:1.85;direction:rtl}
.contract-title{text-align:center;font-size:16px;font-weight:700;border-bottom:2px solid #b8953f;padding-bottom:8px;margin-bottom:14px;color:#1e293b}
.contract-section{font-weight:700;border-right:3px solid #b8953f;padding-right:9px;margin:12px 0 5px;font-size:13px;color:#1e293b}
.contract-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px}
.contract-table th{background:#e5e5e5;border:1px solid #ccc;padding:6px 8px;text-align:center}
.contract-table td{border:1px solid #ccc;padding:6px 8px;text-align:center}
.signatures{display:flex;justify-content:space-between;margin-top:32px}
.signature-box{text-align:center;width:42%;border-top:2px solid #b8953f;padding-top:10px;font-size:12px}

/* Fees box */
.fees-info{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:6px}
.fees-vat{background:#fefce8;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:13px;margin-top:6px}

/* Payment card */
.pay-card{background:#f8fafc;border-radius:8px;padding:12px;margin-bottom:8px;border:1px solid #e2e8f0}

/* Section card */
.scard{background:#f8fafc;border-radius:10px;padding:16px;margin-bottom:14px;border:1px solid #e2e8f0}
.scard-title{font-weight:600;font-size:13px;margin-bottom:10px;color:#334155}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.3);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}


/* Login Page */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f1f5f9}
.login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.1);border:1px solid #e2e8f0}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:18px;font-weight:700;color:#1e293b;margin-top:10px}
.login-logo p{font-size:12px;color:#64748b;margin-top:4px}
.login-title{font-size:15px;font-weight:600;color:#1e293b;margin-bottom:20px;text-align:center}
.login-error{background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;color:#b91c1c;margin-bottom:14px;display:none}

.empty{text-align:center;padding:48px;color:#94a3b8}
.empty-icon{font-size:40px;display:block;margin-bottom:10px}
.loading{text-align:center;padding:40px;color:#64748b}

/* Success banner */
.success-banner{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:14px;text-align:center;color:#15803d;font-weight:600;margin-bottom:16px;font-size:14px}

/* Responsive */
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .step-label{display:none}
  .step-line{width:16px}
}
@media print{
  @page{size:A4;margin:0}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- Header -->
<div class="header">
  <button onclick="openSideMenu()" style="background:rgba(255,255,255,0.1);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;margin-left:8px;flex-shrink:0">☰</button><div class="header-brand">
    <span class="header-scale">⚖️</span>
    <div>
      <h1>مكتب المحامي عبد المحسن الحارثي</h1>
      <p>نظام عقود الأتعاب</p>
    </div>
  </div>
  <div id="side_menu_container"></div><div class="header-actions">
    <button class="btn btn-primary btn-sm" onclick="goNew()">+ قضية جديدة</button>
    <button class="btn btn-sm" onclick="loadCases()" title="تحديث">↻</button>
  </div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat" style="background:#1e293b" id="stat-total"><div class="num">0</div><div class="lbl">إجمالي القضايا</div></div>
  <div class="stat" style="background:#2563eb" id="stat-new"><div class="num">0</div><div class="lbl">قضايا جديدة</div></div>
  <div class="stat" style="background:#ca8a04" id="stat-pending"><div class="num">0</div><div class="lbl">قيد النظر</div></div>
  <div class="stat" style="background:#16a34a" id="stat-done"><div class="num">0</div><div class="lbl">منتهية</div></div>
</div>

<!-- Tabs (only on list) -->
<div class="tabs-wrap" id="tabs-section">
  <div class="tabs">
    <button class="tab active">📁 القضايا المسجلة</button>
  </div>
</div>

<!-- Main Content -->
<div class="content-wrap">
  <div class="card" id="main-content">
    <div class="loading">جارٍ التحميل...</div>
  </div>
</div>

<script>
const SB_URL='https://zmziyiygjttclcpbajje.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpteml5aXlnanR0Y2xjcGJhamplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTIxMjgsImV4cCI6MjA5MzkyODEyOH0.cte36xuUup93-KPcQSc5lVwINRFPuLFfOIyR4--sOxY';

async function sbFetch(path,opts={}){
  const r=await fetch(SB_URL+'/rest/v1/'+path,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    ...opts
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const t=await r.text();return t?JSON.parse(t):[];
}
const getCases=()=>sbFetch('cases?order=created_at.desc&limit=500');
const createCase=d=>sbFetch('cases',{method:'POST',body:JSON.stringify(d)});
const updateCase=(id,d)=>sbFetch('cases?id=eq.'+id,{method:'PATCH',body:JSON.stringify(d)});
const deleteCase=id=>sbFetch('cases?id=eq.'+id,{method:'DELETE'});

const CASE_TYPES={"جنائية":["سرقة","اعتداء","احتيال","قتل خطأ","أخرى"],"مدنية":["مطالبة مالية","عقود","ضرر","أخرى"],"تجارية":["شركات","إفلاس","منافسة غير مشروعة","أخرى"],"أحوال شخصية":["طلاق","حضانة","نفقة","ميراث","أخرى"],"عمالية":["فصل تعسفي","مستحقات عمالية","إصابة عمل","أخرى"],"إدارية":["طعن إداري","قرار تأديبي","أخرى"]};
const SBM={"جديدة":"badge-blue","قيد النظر":"badge-yellow","منتهية":"badge-green","موقوفة":"badge-red"};

let cases=[], screen='list', step=1, selId=null, search='', F={};

function toast(msg,ms=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',ms);
}

function resetF(){
  F={case_number:'',client_name:'',client_id:'',client_phone:'',client_address:'',
    opponent_name:'',case_main_type:'مدنية',case_sub_type:'',case_sub_type_custom:'',
    case_story:'',contract_intro_variable:'',claim_amount:'',fees_percentage:'',
    fees_amount:'',vat_percentage:'',payment_method:'كاش',bank_name:'',bank_iban:'',
    payments:[{amount:'',dueType:'date',dueDate:'',dueText:''},{amount:'',dueType:'date',dueDate:'',dueText:''}],
    status:'جديدة'};
  step=1;
}

function toHijri(d){try{return new Intl.DateTimeFormat('ar-SA-u-ca-islamic',{day:'numeric',month:'long',year:'numeric'}).format(new Date(d))}catch{return''}}
function toGreg(d){return new Intl.DateTimeFormat('ar',{day:'2-digit',month:'2-digit',year:'numeric'}).format(new Date(d))}
function fmt(v){if(!v&&v!==0)return'—';return Number(v).toLocaleString('en-US')}
function calcFees(){
  const base=F.fees_percentage&&F.claim_amount?Number(F.claim_amount)*Number(F.fees_percentage)/100:F.fees_amount?Number(F.fees_amount):0;
  const vat=F.vat_percentage?base*Number(F.vat_percentage)/100:0;
  return{base,vat,total:base+vat};
}
function calcFeesData(d){
  const base=d.fees_percentage?((d.claim_amount||0)*(d.fees_percentage/100)):Number(d.fees_amount||0);
  const vat=d.vat_percentage?base*d.vat_percentage/100:0;
  return{base,vat,total:base+vat};
}

function updateStats(){
  document.querySelector('#stat-total .num').textContent=cases.length;
  document.querySelector('#stat-new .num').textContent=cases.filter(c=>c.status==='جديدة').length;
  document.querySelector('#stat-pending .num').textContent=cases.filter(c=>c.status==='قيد النظر').length;
  document.querySelector('#stat-done .num').textContent=cases.filter(c=>c.status==='منتهية').length;
}

async function loadCases(){
  setContent('<div class="loading">⏳ جارٍ التحميل...</div>');
  try{cases=await getCases();updateStats();render();}
  catch(e){setContent('<div class="empty"><span class="empty-icon">⚠️</span>خطأ في الاتصال بقاعدة البيانات</div>');}
}

function setContent(html){document.getElementById('main-content').innerHTML=html;}

function render(){
  document.getElementById('tabs-section').style.display=screen==='list'?'block':'none';
  if(screen==='list') renderList();
  else if(screen==='newform') renderForm();
  else if(screen==='contract'){const d=cases.find(c=>c.id===selId)||{};renderContract(d);}
  else if(screen==='edit'){const d=cases.find(c=>c.id===selId)||{};renderEdit(d);}
}

function renderList(){
  const filtered=cases.filter(c=>!search||(c.client_name||'').includes(search)||(c.case_number||'').includes(search)||(c.client_id||'').includes(search)||(c.case_main_type||'').includes(search));
  let html=`<div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="form-input" id="srch" style="padding-right:38px" placeholder="بحث بالاسم أو رقم الهوية أو نوع القضية..." value="${search}" oninput="search=this.value;renderList()">
  </div>`;
  if(filtered.length===0){
    html+=`<div class="empty"><span class="empty-icon">📂</span>لا توجد قضايا مسجلة</div>`;
  } else {
    html+=filtered.map(c=>`<div class="case-row">
      <div style="flex:1;min-width:0">
        <div class="case-name">${esc(c.client_name||'—')}${c.case_number?`<span class="case-num">#${esc(c.case_number)}</span>`:''}</div>
        <div class="case-meta">${esc(c.case_main_type||'')}${c.case_sub_type?' - '+esc(c.case_sub_type):''} • ${esc(c.client_phone||'')}</div>
        ${c.opponent_name?`<div style="font-size:11px;color:#94a3b8;margin-top:2px">الخصم: ${esc(c.opponent_name)}</div>`:''}
      </div>
      <div class="case-actions">
        <span class="badge ${SBM[c.status]||'badge-blue'}">${c.status}</span>
        <button class="ibtn" onclick="goContract('${c.id}')" title="عرض العقد">📄</button>
        <button class="ibtn" onclick="goEdit('${c.id}')" title="تعديل" style="color:#3b82f6">✏️</button>
        <button class="ibtn" onclick="confirmDelete('${c.id}')" title="حذف" style="color:#ef4444">🗑️</button>
      </div>
    </div>`).join('');
  }
  setContent(html);
}

function stepsHTML(){
  const labels=['بيانات الموكل','نوع القضية','تفاصيل','تمهيد العقد','الأتعاب','العقد'];
  return`<div class="steps">${labels.map((l,i)=>{const n=i+1,done=step>n,act=step===n;
    return`<div style="display:flex;align-items:center">
      <div class="step-col">
        <div class="step-circle ${done?'step-done':act?'step-active':'step-pending'}">${done?'✓':n}</div>
        <div class="step-label">${l}</div>
      </div>
      ${i<labels.length-1?`<div class="step-line ${done?'step-line-done':'step-line-pending'}"></div>`:''}
    </div>`;}).join('')}</div>`;
}

function renderForm(){
  const {base,vat,total}=calcFees();
  const subs=CASE_TYPES[F.case_main_type]||[];
  let body='';

  if(step===1){body=`
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;color:#1e293b">بيانات الموكل</h3>
    <label class="form-label">رقم القضية (اختياري)</label>
    <input class="form-input" id="f_cn" value="${esc(F.case_number)}" placeholder="مثال: 1234/2026">
    <label class="form-label">الاسم الكامل *</label>
    <input class="form-input" id="f_name" value="${esc(F.client_name)}" placeholder="أدخل الاسم الكامل">
    <div class="grid2">
      <div><label class="form-label">رقم الهوية / الجواز *</label><input class="form-input" id="f_id" value="${esc(F.client_id)}"></div>
      <div><label class="form-label">رقم الجوال *</label><input class="form-input" id="f_phone" value="${esc(F.client_phone)}" placeholder="05xxxxxxxx"></div>
    </div>
    <label class="form-label">العنوان</label>
    <input class="form-input" id="f_addr" value="${esc(F.client_address)}" placeholder="المدينة - الحي">
    <label class="form-label">اسم الخصم (اختياري)</label>
    <input class="form-input" id="f_opp" value="${esc(F.opponent_name)}">
    <div class="form-nav">
      <button class="btn btn-danger btn-sm" onclick="if(confirm('هل تريد إلغاء إنشاء العقد والعودة للقائمة؟')){screen=\'list\';render();}">✕ إلغاء</button>
      <button class="btn btn-primary" id="btn_next1">التالي ←</button>
    </div>`;}

  else if(step===2){body=`
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;color:#1e293b">نوع القضية</h3>
    <label class="form-label">النوع الرئيسي</label>
    <select class="form-input" id="f_mtype">${Object.keys(CASE_TYPES).map(t=>`<option ${F.case_main_type===t?'selected':''}>${t}</option>`).join('')}</select>
    <label class="form-label">النوع الفرعي</label>
    <select class="form-input" id="f_stype"><option value="">اختر النوع الفرعي</option>${subs.map(t=>`<option ${F.case_sub_type===t?'selected':''}>${t}</option>`).join('')}</select>
    ${F.case_sub_type==='أخرى'?`<label class="form-label">حدد النوع الفرعي</label><input class="form-input" id="f_scustom" value="${esc(F.case_sub_type_custom)}" placeholder="اكتب نوع القضية...">`:``}
    <div class="form-nav">
      <button class="btn" onclick="saveStep2Back()">→ السابق</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-danger btn-sm" onclick="if(confirm('هل تريد إلغاء إنشاء العقد والعودة للقائمة؟')){screen=\'list\';render();}">✕ إلغاء</button>
        <button class="btn btn-primary" onclick="saveStep2Next()">التالي ←</button>
      </div>
    </div>`;}

  else if(step===3){body=`
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;color:#1e293b">تفاصيل القضية</h3>
    <label class="form-label">ملخص القضية</label>

        <button class="btn btn-primary" onclick="saveStep3()">التالي ←</button>

    <textarea class="form-input" id="f_intro" rows="6" placeholder="أكمل الكلام هنا...">${esc(F.contract_intro_variable)}</textarea>
    <div class="form-nav">
      <button class="btn" onclick="saveStep4Back()">→ السابق</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-danger btn-sm" onclick="if(confirm('هل تريد إلغاء إنشاء العقد والعودة للقائمة؟')){screen=\'list\';render();}">✕ إلغاء</button>

  else if(step===5){

    body=`
    <h3 style="font-size:15px;font-weight:700;margin-bottom:16px;color:#1e293b">الأتعاب والدفع</h3>
    <label class="form-label">مبلغ المطالبة (ريال)</label>
    <input class="form-input" type="number" id="f_claim" value="${F.claim_amount}" oninput="updateFeesCalc()">
    <div class="grid2">
      <div><label class="form-label">نسبة الأتعاب (%)</label><input class="form-input" type="number" id="f_feespct" value="${F.fees_percentage}" placeholder="مثال: 10" oninput="updateFeesCalc()"></div>
      <div><label class="form-label">أو مبلغ ثابت (ريال)</label><input class="form-input" type="number" id="f_feesamt" value="${F.fees_amount}" placeholder="مثال: 5000" oninput="updateFeesCalc()"></div>
    </div>
    ${base>0?`<div class="fees-info">الأتعاب الأساسية: <strong>${fmt(Math.round(base))} ريال</strong></div>`:''}
    <label class="form-label">نسبة ضريبة القيمة المضافة (%)</label>

    <div style="font-weight:600;font-size:13px;margin:16px 0 8px;color:#334155">الاستحقاقات والدفعات</div>
    ${payRows}
    <button class="btn btn-sm" style="width:100%;margin-bottom:14px" onclick="saveStep5Data();F.payments.push({amount:'',dueType:'date',dueDate:'',dueText:''});renderForm()">+ إضافة دفعة جديدة</button>
    <label class="form-label">طريقة الدفع</label>
    <select class="form-input" id="f_paymethod">
      <option ${F.payment_method==='كاش'?'selected':''}>كاش</option>
      <option ${F.payment_method==='تحويل بنكي'?'selected':''}>تحويل بنكي</option>
    </select>
    ${F.payment_method==='تحويل بنكي'?`<div class="grid2" style="margin-top:10px">
      <div><label class="form-label">اسم البنك</label><input class="form-input" id="f_bank" value="${esc(F.bank_name)}" placeholder="البنك الأهلي"></div>
      <div><label class="form-label">رقم الإيبان</label><input class="form-input" id="f_iban" value="${esc(F.bank_iban)}" placeholder="SA..." dir="ltr"></div>
    </div>`:''}
    <div class="form-nav">
      <button class="btn" onclick="saveStep5Back()">→ السابق</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-danger btn-sm" onclick="if(confirm('هل تريد إلغاء إنشاء العقد والعودة للقائمة؟')){screen=\'list\';render();}">✕ إلغاء</button>
        <button class="btn btn-success" id="btn_save">✓ حفظ وإصدار العقد</button>
      </div>
    </div>`;}

  else if(step===6){
    const saved=cases[0]||{};
    setContent(`<div class="success-banner">✅ تم حفظ القضية بنجاح!</div>`+buildContractHTML(saved));

  setContent(stepsHTML()+body);
  attachFormEvents();
}

function buildContractHTML(data){

  const {base,vat,total}=calcFeesData(data);
  const feesLine=data.fees_percentage?`نسبة قدرها (${data.fees_percentage}%) من إجمالي المبلغ المحكوم به`:`مبلغ إجمالي قدره (${fmt(base)}) ريال`;
  const subType=data.case_sub_type==='أخرى'&&data.case_sub_type_custom?data.case_sub_type_custom:data.case_sub_type;
  const pays=Array.isArray(data.payments)?data.payments.filter(p=>Number(p.amount)>0):[];

  return`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button class="btn" onclick="screen='list';render()">→ العودة للقائمة</button>
    <button class="btn" onclick="goEdit('${data.id}')">✏️ تعديل</button>
    <button class="btn btn-primary" onclick="printContract('${data.id}')">🖨️ طباعة العقد</button>
  </div>

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">

      <img src="${LOGO_BASE64}" style="height:64px;width:auto;object-fit:contain" alt="">

    <p>تم بحمد الله وتوفيقه في ${toHijri(contractDate)} الموافق ${toGreg(contractDate)} الاتفاق والتراضي بمدينة جدة بين كل من: -</p>
    <p style="margin-top:7px"><strong>الطرف الأول:</strong> السادة/ مكتب المحامي عبد المحسن بن سعد الحارثي - ترخيص محاماة رقم (13/29)، وعنوانه: جدة - حي الشاطئ - شارع طاهر زمخشري، جوال رقم (0566669936)، بريد إلكتروني (amr-law@hotmail.com)، ويمثله المحامي/ عبد المحسن بن سعد الحارثي - سعودي الجنسية - رقم السجل المدني (1010119152)، ويشار إليه بـ <strong>(الطرف الأول)</strong>.</p>
    <p style="margin-top:6px"><strong>الطرف الثاني:</strong> السيد/ <strong>${esc(data.client_name||'—')}</strong> – رقم الهوية/الجواز: <strong>${esc(data.client_id||'')}</strong>، الجوال: <strong>${esc(data.client_phone||'')}</strong>${data.client_address?`، العنوان: ${esc(data.client_address)}`:''}، ويشار إليه بـ <strong>(الطرف الثاني)</strong>.</p>
    <div class="contract-section">أولاً: التمهيد: -</div>

    <div class="contract-section">ثانياً: موضوع العقد: -</div>
    <ol style="padding-right:20px;line-height:2">
      <li><strong>تصنيف القضية:</strong> ${esc(data.case_main_type||'')}${subType?' - '+esc(subType):''}</li>
      ${data.case_story?`<li><strong>موضوع القضية:</strong> ${esc(data.case_story)}</li>`:''}

    <ol style="padding-right:20px;line-height:2">
      <li>يلتزم الطرف الأول بدراسة موضوع القضية وحضور الجلسات نيابةً عن الطرف الثاني وتقديم المذكرات واللوائح القانونية المتطلب تقديمها للسير في الإجراءات وحتى الفصل فيها بحكم مكتسب للقطعية منهٍ للخصومة.</li>
      <li>يلتزم الطرف الأول بحضور الجلسات والقيام بالمراجعات واستكمال الإجراءات الخاصة بالدعاوى موضوع العقد وتقديم ومتابعة طلبات التنفيذ ضد خصم الطرف الثاني.</li>
      <li>يلتزم الطرف الأول ببذل العناية في المدافعة والمرافعة عن حقوق الطرف الثاني، ويتعهد بالمحافظة على حقوق الطرف الثاني ومستنداته ووثائقه.</li>
      <li>يلتزم الطرف الأول بالمحافظة التامة على سرية المعلومات الخاصة بموضوع العقد وبمتابعة القضايا المتعاقد عليها بإخلاص وحسن النية لحين الانتهاء منها.</li>
      <li>يلتزم الطرف الأول بتزويد الطرف الثاني بتقرير مفصل عن القضية وجميع الإجراءات المتخذة فيها متى ما طلب منه ذلك.</li>
      <li>يلتزم الطرف الأول بعدم استلام أي مبالغ سواءً نقدية أو شيكات محررة لأمره أو حوالات لحسابه نيابةً عن الطرف الثاني.</li>

    <div class="contract-section">خامساً: التزامات الطرف الثاني: -</div>

      <li>إحاطة الطرف الأول بكافة تفاصيل موضوع هذا العقد وتزويده بجميع المستندات اللازمة.</li>
      <li>لا يحق للطرف الثاني أن يعهد لأي طرف آخر القيام بالأعمال محل هذا العقد.</li>
      <li>تسليم أصول المستندات اللازمة للطرف الأول لتقديمها للجهات المختصة عند طلبها.</li>
      <li>إشعار الطرف الأول بأي سداد أو إبرام اتفاقية جدولة أو تنازل أو تسوية تتم مع الخصم.</li>
    </ol>
    <div class="contract-section">سادساً: قيمة الأتعاب: -</div>
    <p>اتفق الطرفان على أن يكون للطرف الأول ${feesLine}، وذلك مقابل ما يبذله من جهد وعمل في سير هذه القضية وتمثيل الطرف الثاني أمام الجهات القضائية المختصة حتى صدور الحكم النهائي المكتسب للقطعية.</p>
    <div class="contract-section">سابعاً: الأتعاب والمصروفات: -</div>
    <p>اتفق الطرفان على أن تكون أتعاب الطرف الأول مبلغ وقدره (<strong>${fmt(Math.round(total))} ريال</strong>) على أن تُستحق وتُسدد على النحو التالي:</p>
    ${pays.length>0?`<table class="contract-table">
      <thead><tr><th>رقم</th><th>الوصف</th><th>المبلغ</th><th>VAT${data.vat_percentage?' '+data.vat_percentage+'%':''}</th><th>الإجمالي</th><th>الاستحقاق</th></tr></thead>
      <tbody>${pays.map((p,i)=>{const v=data.vat_percentage?Math.round(p.amount*data.vat_percentage/100*100)/100:0;const tt=p.amount+v;
        return`<tr><td>${i+1}</td><td style="text-align:right">الدفعة ${i+1}</td><td>${fmt(p.amount)} ريال</td><td>${data.vat_percentage?fmt(v)+' ريال':'—'}</td><td><strong>${fmt(tt)} ريال</strong></td><td>${p.dueType==='date'?p.dueDate||'—':p.dueText||'—'}</td></tr>`;}).join('')}
      </tbody></table>`:''}
    ${data.payment_method==='تحويل بنكي'&&data.bank_name?`<p style="margin-top:6px">البنك: <strong>${esc(data.bank_name)}</strong>${data.bank_iban?' - الإيبان: '+esc(data.bank_iban):''}</p>`:''}
    <div class="contract-section">ثامناً: الأحكام العامة: -</div>
    <ol style="padding-right:20px;line-height:2">
      <li>اتفق الطرفان على استحقاق الطرف الأول لكامل الأتعاب المنصوص عليها في (سابعاً) أعلاه حال سداد العميل المدين مبلغ المديونية قبل البدء في اتخاذ الإجراءات القانونية وبعد توقيع العقد أو جدولة الدين.</li>
      <li>اتفق الطرفان على أن الدفعات المقدمة مبالغ مستحقة لصالح الطرف الأول نظير البدء في الأعمال ولا يجوز المطالبة باستردادها.</li>
      <li>اتفق الطرفان على أن الطرف الأول يستحق كامل الأتعاب حال فسخ الطرف الثاني الوكالة الشرعية أو حال طلب إيقاف الطرف الأول عن الاستمرار في إنجاز الأعمال.</li>
      <li>تكون المراسلات بين الطرفين على العناوين الموضحة في بداية هذا العقد أو عن طريق البريد الإلكتروني.</li>
      <li>أي خلاف ينشأ عن تنفيذ أو تفسير هذا العقد إذا لم يتم تسويته بالطرق الودية خلال (30) يوماً، يتم اللجوء إلى المحاكم المختصة في مدينة جدة.</li>
      <li>يقر الطرفان بتوقيعهما على هذا العقد وهما طائعين مختارين عالمين بمضمونه ومحتوياته.</li>
      <li>حُرِّر هذا العقد من نسختين، بيد كل طرف منهما نسخة للعمل بموجبه.</li>
    </ol>
    <div class="signatures">
      <div class="signature-box"><p><strong>الطرف الأول</strong></p><p>مكتب المحامي عبد المحسن الحارثي</p><p style="margin-top:12px">التوقيع: _______________</p></div>
      <div class="signature-box"><p><strong>الطرف الثاني</strong></p><p>${esc(data.client_name||'')}</p><p style="margin-top:12px">التوقيع: _______________</p></div>
    </div>
  </div>`;
}

function renderContract(data){
  setContent(buildContractHTML(data));
}

function attachFormEvents(){
  const b1=document.getElementById('btn_next1');
  if(b1) b1.addEventListener('click',()=>{
    const name=document.getElementById('f_name');
    const id=document.getElementById('f_id');
    const phone=document.getElementById('f_phone');
    if(!name||!name.value.trim()||!id.value.trim()||!phone.value.trim()){
      toast('⚠️ يرجى ملء الحقول الإلزامية: الاسم، رقم الهوية، رقم الجوال');return;
    }
    F.case_number=document.getElementById('f_cn').value;
    F.client_name=name.value;F.client_id=id.value;F.client_phone=phone.value;
    F.client_address=document.getElementById('f_addr').value;
    F.opponent_name=document.getElementById('f_opp').value;
    step=2;renderForm();
  });
  const mt=document.getElementById('f_mtype');
  if(mt) mt.addEventListener('change',e=>{F.case_main_type=e.target.value;F.case_sub_type='';renderForm();});
  const st=document.getElementById('f_stype');
  if(st) st.addEventListener('change',e=>{F.case_sub_type=e.target.value;renderForm();});
  const pm=document.getElementById('f_paymethod');
  if(pm) pm.addEventListener('change',e=>{saveStep5Data();F.payment_method=e.target.value;renderForm();});
  F.payments.forEach((_,i)=>{
    const pt=document.getElementById('pay_type_'+i);
    if(pt) pt.addEventListener('change',e=>{saveStep5Data();F.payments[i].dueType=e.target.value;F.payments[i].dueDate='';F.payments[i].dueText='';renderForm();});
  });
  const bs=document.getElementById('btn_save');
  if(bs) bs.addEventListener('click',doSaveCase);
}

function attachEditSaveBtn(){
  const b=document.getElementById('btn_edit_save');
  if(b) b.addEventListener('click',()=>doSaveEdit(selId));
}

function saveStep2Back(){const mt=document.getElementById('f_mtype');const st=document.getElementById('f_stype');if(mt)F.case_main_type=mt.value;if(st)F.case_sub_type=st.value;step=1;renderForm();}
function saveStep2Next(){const mt=document.getElementById('f_mtype');const st=document.getElementById('f_stype');const sc=document.getElementById('f_scustom');if(mt)F.case_main_type=mt.value;if(st)F.case_sub_type=st.value;if(sc)F.case_sub_type_custom=sc.value;step=3;renderForm();}
function saveStep3(){const s=document.getElementById('f_story');if(s)F.case_story=s.value;step=4;renderForm();}
function saveStep3Back(){const s=document.getElementById('f_story');if(s)F.case_story=s.value;step=2;renderForm();}
function saveStep4(){const i=document.getElementById('f_intro');if(i)F.contract_intro_variable=i.value;step=5;renderForm();}
function saveStep4Back(){const i=document.getElementById('f_intro');if(i)F.contract_intro_variable=i.value;step=3;renderForm();}
function saveStep5Back(){saveStep5Data();step=4;renderForm();}

function saveStep5Data(){
  const g=id=>document.getElementById(id);
  if(g('f_claim'))F.claim_amount=g('f_claim').value;
  if(g('f_feespct'))F.fees_percentage=g('f_feespct').value;
  if(g('f_feesamt'))F.fees_amount=g('f_feesamt').value;
  if(g('f_vat'))F.vat_percentage=g('f_vat').value;
  if(g('f_paymethod'))F.payment_method=g('f_paymethod').value;
  if(g('f_bank'))F.bank_name=g('f_bank').value;
  if(g('f_iban'))F.bank_iban=g('f_iban').value;
  F.payments.forEach((_,i)=>{
    const amt=g('pay_amt_'+i);const due=g('pay_due_'+i);
    if(amt)F.payments[i].amount=amt.value;
    if(due){if(F.payments[i].dueType==='date')F.payments[i].dueDate=due.value;else F.payments[i].dueText=due.value;}
  });
}

async function doSaveCase(){
  saveStep5Data();
  const btn=document.getElementById('btn_save');
  if(btn){btn.disabled=true;btn.textContent='⏳ جارٍ الحفظ...';}
  const payload={
    case_number:F.case_number||null,client_name:F.client_name,client_id:F.client_id,
    client_phone:F.client_phone,client_address:F.client_address||null,
    opponent_name:F.opponent_name||null,case_main_type:F.case_main_type,
    case_sub_type:F.case_sub_type||null,case_sub_type_custom:F.case_sub_type_custom||null,
    case_story:F.case_story||null,contract_intro_variable:F.contract_intro_variable||null,
    claim_amount:F.claim_amount?Number(F.claim_amount):null,
    fees_percentage:F.fees_percentage?Number(F.fees_percentage):null,
    fees_amount:F.fees_amount?Number(F.fees_amount):null,
    vat_percentage:F.vat_percentage?Number(F.vat_percentage):null,
    payment_method:F.payment_method,bank_name:F.bank_name||null,bank_iban:F.bank_iban||null,
    payments:F.payments.filter(p=>p.amount).map(p=>({amount:Number(p.amount),dueType:p.dueType,dueDate:p.dueType==='date'?p.dueDate:null,dueText:p.dueType==='text'?p.dueText:null})),
    status:F.status,contract_date:new Date().toISOString().split('T')[0]
  };
  try{
    await createCase(payload);
    await loadCasesQuiet();
    step=6;renderForm();
    toast('✅ تم حفظ القضية بنجاح!');
  }catch(e){
    toast('❌ خطأ في الحفظ: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='✓ حفظ وإصدار العقد';}
  }
}

async function doSaveEdit(id){
  const g=i=>document.getElementById(i);
  const btn=document.getElementById('btn_edit_save');
  if(btn){btn.disabled=true;btn.textContent='⏳ جارٍ الحفظ...';}
  const payload={
    case_number:g('e_cn').value||null,status:g('e_status').value,
    client_name:g('e_name').value,client_id:g('e_id').value,
    client_phone:g('e_phone').value,client_address:g('e_addr').value||null,
    opponent_name:g('e_opp').value||null,case_story:g('e_story').value||null,
    claim_amount:Number(g('e_claim').value)||null,
    fees_percentage:Number(g('e_feespct').value)||null,
    fees_amount:Number(g('e_feesamt').value)||null,
    vat_percentage:Number(g('e_vat').value)||null,
    last_edited_date:new Date().toISOString()
  };
  try{
    await updateCase(id,payload);
    await loadCasesQuiet();
    goContract(id);
    toast('✅ تم حفظ التعديلات!');
  }catch(e){
    toast('❌ خطأ: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='💾 حفظ التعديلات';}
  }
}

async function loadCasesQuiet(){
  try{cases=await getCases();updateStats();}catch{}
}

async function confirmDelete(id){
  if(!confirm('هل تريد حذف هذه القضية نهائياً؟'))return;
  try{
    await deleteCase(id);
    cases=cases.filter(c=>c.id!==id);
    updateStats();screen='list';renderList();
    toast('🗑️ تم الحذف');
  }catch(e){toast('❌ خطأ في الحذف');}
}

function goNew(){resetF();screen='newform';render();}
function goContract(id){selId=id;screen='contract';render();}
function goEdit(id){selId=id;screen='edit';render();}

function updateFeesCalc(){
  const claim=parseFloat(document.getElementById('f_claim')?.value)||0;
  const pct=parseFloat(document.getElementById('f_feespct')?.value)||0;
  const amt=parseFloat(document.getElementById('f_feesamt')?.value)||0;
  const vat=parseFloat(document.getElementById('f_vat')?.value)||0;
  const base=pct&&claim?claim*pct/100:amt?amt:0;
  const vatAmt=vat?base*vat/100:0;
  const total=base+vatAmt;
  const box=document.getElementById('fees_calc_box');
  if(!box)return;
  if(base>0){
    box.style.display='block';
    box.innerHTML=`<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 16px;margin-top:8px;font-size:13px;line-height:2">
      <div>💰 الأتعاب الأساسية: <strong style="color:#15803d">${Number(Math.round(base)).toLocaleString('en-US')} ريال</strong></div>
      ${vat>0?`<div>🧾 ضريبة القيمة المضافة (${vat}%): <strong style="color:#b45309">${Number(Math.round(vatAmt)).toLocaleString('en-US')} ريال</strong></div>`:''}
      ${vat>0?`<div style="border-top:1px solid #86efac;margin-top:4px;padding-top:4px">📊 الإجمالي شامل الضريبة: <strong style="color:#1e293b;font-size:14px">${Number(Math.round(total)).toLocaleString('en-US')} ريال</strong></div>`:''}
    </div>`;
  } else {
    box.style.display='none';
  }
}


// ===== AUTH SYSTEM =====
const SB_AUTH_URL = SB_URL + '/auth/v1';

async function signIn(email, password) {
  const res = await fetch(SB_AUTH_URL + '/token?grant_type=password', {
    method: 'POST',
    headers: {'apikey': SB_KEY, 'Content-Type': 'application/json'},
    body: JSON.stringify({email, password})
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error_description || data.msg || 'خطأ في تسجيل الدخول');
  return data;
}

async function signOut() {
  const token = localStorage.getItem('sb_token');
  if (token) {
    await fetch(SB_AUTH_URL + '/logout', {
      method: 'POST',
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + token}
    }).catch(() => {});
  }
  localStorage.removeItem('sb_token');
  localStorage.removeItem('sb_user');
  currentUser = null;
  screen = 'list';
  showLogin();
}

async function getUser() {
  const token = localStorage.getItem('sb_token');
  if (!token) return null;
  try {
    const res = await fetch(SB_AUTH_URL + '/user', {
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + token}
    });
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

let currentUser = null;
let authToken = null;

// Override sbFetch to use auth token
async function sbFetch(path, opts={}) {
  const token = localStorage.getItem('sb_token') || SB_KEY;
  const r = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Prefer': 'return=representation', ...(opts.headers||{})},
    ...opts
  });
  if (!r.ok) {
    if (r.status === 401) { signOut(); return []; }
    const e = await r.text(); throw new Error(e);
  }
  const t = await r.text(); return t ? JSON.parse(t) : [];
}

  document.getElementById('btn_login').addEventListener('click', doLogin);

async function doGoogleLogin() {
  window.location.href = SB_URL + '/auth/v1/authorize?provider=google&redirect_to=' + encodeURIComponent(window.location.origin + window.location.pathname);
}

async function doLogin() {
  const email = document.getElementById('l_email').value.trim();
  const pass = document.getElementById('l_pass').value;
  const btn = document.getElementById('btn_login');
  const err = document.getElementById('login_error');
  
  if (!email || !pass) { err.textContent='يرجى إدخال الإيميل وكلمة المرور'; err.style.display='block'; return; }
  
  btn.disabled = true; btn.textContent = '⏳ جارٍ الدخول...';
  err.style.display = 'none';
  
  try {
    const data = await signIn(email, pass);
    localStorage.setItem('sb_token', data.access_token);
    localStorage.setItem('sb_user', JSON.stringify(data.user));
    currentUser = data.user;
    document.getElementById('login_overlay')?.remove();
    initApp();
  } catch(e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'دخول';
  }
}

function isAdmin() {
  if (!currentUser) return false;
  return currentUser?.app_metadata?.role === 'admin' ||
         currentUser?.user_metadata?.role === 'admin';
}

function openSideMenu() { document.getElementById('side_overlay').style.display='block'; }
function closeSideMenu() { document.getElementById('side_overlay').style.display='none'; }

async function initApp() {
  document.getElementById('login_overlay')?.remove();
  const sideContainer = document.getElementById('side_menu_container');
  if (sideContainer) sideContainer.innerHTML = renderSideMenu();
  document.getElementById('toast').style.display='none';
  await loadCases();
}

async function checkAuth() {
  // Handle Google OAuth callback (token in URL hash)
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const params = new URLSearchParams(hash.substring(1));
    const token = params.get('access_token');
    if (token) {
      localStorage.setItem('sb_token', token);
      window.location.hash = '';
    }
  }

  const token = localStorage.getItem('sb_token');
  if (!token) { showLogin(); return; }
  const user = await getUser();
  if (!user) { showLogin(); return; }
  currentUser = user;
  initApp();
}


// ===== USER MANAGEMENT =====
let serviceRoleKey = localStorage.getItem('sb_srkey') || '';

function openUserMgmt() {
  screen = 'users';
  document.getElementById('tabs-section').style.display = 'none';
  renderUserMgmt();
}

async function renderUserMgmt() {
  setContent('<div class="loading">⏳ جارٍ التحميل...</div>');

  let usersHTML = '';

  if (!serviceRoleKey) {
    usersHTML = `
      <div style="background:#fef9c3;border:1px solid #fde68a;border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:#78350f">
        ⚠️ لعرض وإدارة المستخدمين، أدخل <strong>Service Role Key</strong> من لوحة تحكم Supabase.
      </div>`;
  } else {
    try {
      const res = await fetch(SB_URL + '/auth/v1/admin/users?page=1&per_page=50', {
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + serviceRoleKey }
      });
      if (!res.ok) throw new Error('تعذّر جلب المستخدمين — تأكد من صحة Service Role Key');
      const data = await res.json();
      const users = data.users || [];
      if (users.length === 0) {
        usersHTML = '<div class="empty"><span class="empty-icon">👤</span>لا يوجد مستخدمون</div>';
      } else {
        usersHTML = users.map(u => {
          const role = u.app_metadata?.role || 'user';
          const isMe = u.email === currentUser?.email;
          const iAmAdmin = isAdmin();
          const roleBadge = role === 'admin'
            ? '<span class="badge badge-blue">مسؤول</span>'
            : '<span class="badge badge-yellow">مستخدم</span>';
          return `
          <div class="case-row" style="align-items:center">
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                ${esc(u.email||'')} ${roleBadge} ${isMe ? '<span class="badge badge-green">أنت</span>' : ''}
              </div>
              <div style="font-size:11px;color:#94a3b8;margin-top:3px">
                آخر دخول: ${u.last_sign_in_at ? new Date(u.last_sign_in_at).toLocaleDateString('ar-SA') : '—'}
                &nbsp;•&nbsp; أُنشئ: ${new Date(u.created_at).toLocaleDateString('ar-SA')}
              </div>
            </div>
            <div style="display:flex;gap:6px;align-items:center;margin-right:10px">
              ${iAmAdmin ? `
                <select onchange="changeRole('${u.id}',this.value)" style="padding:5px 10px;border-radius:8px;border:1px solid #cbd5e1;font-size:12px;font-family:inherit;cursor:pointer;color:#334155">
                  <option value="user" ${role==='user'?'selected':''}>مستخدم</option>
                  <option value="admin" ${role==='admin'?'selected':''}>مسؤول</option>
                </select>
                ${!isMe ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}','${esc(u.email||'')}')">🗑️</button>` : ''}
              ` : ''}
            </div>
          </div>`;
        }).join('');
      }
    } catch(e) {
      usersHTML = `<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:14px;color:#b91c1c;font-size:13px">❌ ${e.message}</div>`;
    }
  }

  setContent(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h3 style="font-size:16px;font-weight:700;color:#1e293b">👥 إدارة المستخدمين</h3>
      <button class="btn btn-sm" onclick="screen='list';render()">→ رجوع</button>
    </div>

    <!-- Service Role Key -->
    <div class="scard">
      <div class="scard-title">🔑 مفتاح الصلاحيات (Service Role Key)</div>
      <div style="display:flex;gap:8px">
        <input class="form-input" type="password" id="srkey_input" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." value="${esc(serviceRoleKey)}" dir="ltr" style="flex:1">
        <button class="btn btn-primary" onclick="saveSRKey()">حفظ</button>
        ${serviceRoleKey ? `<button class="btn" onclick="clearSRKey()">مسح</button>` : ''}
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-top:6px">يمكن الحصول عليه من: Supabase Dashboard → Settings → API → service_role</div>
    </div>

    <!-- Invite New User -->
    ${isAdmin() ? `
    <div class="scard">
      <div class="scard-title">➕ دعوة مستخدم جديد</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input class="form-input" type="email" id="invite_email" placeholder="example@email.com" dir="ltr" style="flex:2;min-width:180px">
        <select class="form-input" id="invite_role" style="flex:1;min-width:110px">
          <option value="user">مستخدم</option>
          <option value="admin">مسؤول</option>
        </select>
        <button class="btn btn-success" onclick="inviteUser()">إرسال دعوة</button>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-top:6px">سيتم إرسال رابط تسجيل دخول للبريد الإلكتروني المُدخل</div>
    </div>` : ''}

    <!-- Users List -->
    <div class="scard">
      <div class="scard-title">قائمة المستخدمين</div>
      <div id="users_list">${usersHTML}</div>
    </div>
  `);
}

function saveSRKey() {
  const val = document.getElementById('srkey_input').value.trim();
  if (!val) { toast('⚠️ أدخل المفتاح أولاً'); return; }
  serviceRoleKey = val;
  localStorage.setItem('sb_srkey', val);
  toast('✅ تم حفظ المفتاح');
  renderUserMgmt();
}

function clearSRKey() {
  serviceRoleKey = '';
  localStorage.removeItem('sb_srkey');
  toast('🗑️ تم مسح المفتاح');
  renderUserMgmt();
}

async function inviteUser() {
  const email = document.getElementById('invite_email').value.trim();
  const role = document.getElementById('invite_role').value;
  if (!email) { toast('⚠️ أدخل البريد الإلكتروني'); return; }
  if (!serviceRoleKey) { toast('⚠️ أدخل Service Role Key أولاً'); return; }
  try {
    const res = await fetch(SB_URL + '/auth/v1/invite', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + serviceRoleKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, data: { role } })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.msg || e.message || 'خطأ'); }
    // Set app_metadata role after invite
    const userData = await res.json();
    if (userData.id) await setUserRole(userData.id, role);
    toast('✅ تم إرسال الدعوة إلى ' + email + ' كـ' + (role==='admin'?'مسؤول':'مستخدم'));
    document.getElementById('invite_email').value = '';
    setTimeout(() => renderUserMgmt(), 1000);
  } catch(e) { toast('❌ ' + e.message); }
}

async function setUserRole(id, role) {
  await fetch(SB_URL + '/auth/v1/admin/users/' + id, {
    method: 'PUT',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + serviceRoleKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ app_metadata: { role } })
  });
}

async function changeRole(id, role) {
  if (!serviceRoleKey) { toast('⚠️ أدخل Service Role Key أولاً'); return; }
  try {
    await setUserRole(id, role);
    toast('✅ تم تغيير الدور إلى ' + (role==='admin'?'مسؤول':'مستخدم'));
    setTimeout(() => renderUserMgmt(), 800);
  } catch(e) { toast('❌ ' + e.message); }
}

async function deleteUser(id, email) {
  if (!confirm(`هل تريد حذف المستخدم:\n${email}؟`)) return;
  if (!serviceRoleKey) { toast('⚠️ أدخل Service Role Key أولاً'); return; }
  try {
    const res = await fetch(SB_URL + '/auth/v1/admin/users/' + id, {
      method: 'DELETE',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + serviceRoleKey }
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.msg || e.message || 'خطأ'); }
    toast('🗑️ تم حذف المستخدم');
    renderUserMgmt();
  } catch(e) { toast('❌ ' + e.message); }
}

// Start app
checkAuth();
</script>
